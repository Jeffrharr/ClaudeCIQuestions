# Understanding Gate — arms the `understanding-check` status as `pending` on every PR push.
# Clear it by running `/check-my-vibe` in Claude Code; that flips the status to success.
name: Understanding Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  statuses: write

jobs:
  arm:
    runs-on: ubuntu-latest
    steps:
      - uses: Jeffrharr/CheckMyVibe@main
